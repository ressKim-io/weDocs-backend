spring:
  application:
    name: doc-service
  threads:
    virtual:
      enabled: true   # Java 25 Virtual Thread — I/O 바운드(DB) doc-service
  datasource:
    # 접속정보·시크릿은 환경변수 주입 필수(security.md) — 커밋된 dev 기본값을 제거해 non-dev 환경을 fail-closed로.
    # env 미설정 시: 미해결 placeholder가 리터럴로 통과 → Hikari `DatabaseDriver.fromJdbcUrl`에서
    # `IllegalArgumentException: 'url' must start with "jdbc"`로 기동 실패(silent/embedded fallback 없음, 실측 확인).
    # 로컬 dev 기본값 = application-dev.yml(SPRING_PROFILES_ACTIVE=dev, `make run-doc`).
    # 테스트: @ServiceConnection이 datasource 주입 + test/resources/application.yml이 이 main을 **완전 대체**
    # (동명 classpath 리소스, 병합 아님) → 이 키 제거 무영향(148 green).
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # 풀 크기 기본값(10) 암묵 의존 금지(config-contract-audit) — VT 대량 동시 요청에서도 DB
      # 커넥션 상한은 이 값. 정량 재조정은 M3 부하검증(SDD §15)에서.
      maximum-pool-size: 10
      # 비관 락(move 직렬화) 대기 상한 — 무제한 대기가 풀 고갈로 번지는 것 차단(1c 게이트 MED-7).
      # 세션 GUC라 모든 문장에 적용되지만, 직렬화된 move는 ms 단위라 정상 경합을 자르지 않는다.
      # ⚠️ Flyway도 같은 풀을 공유 — 트래픽 중 대형 DDL(ACCESS EXCLUSIVE) 마이그레이션은
      # 3s 내 락 실패 가능. 마이그레이션 창 설계 시 이 값 인지 필요(M3+).
      connection-init-sql: SET lock_timeout = '${WEDOCS_DB_LOCK_TIMEOUT:3s}'
  mvc:
    problemdetails:
      enabled: true   # 프레임워크 예외(검증 400 등)도 RFC 9457 ProblemDetail로 — 에러 스키마 단일화(error-handling P3)
  flyway:
    enabled: true   # 스키마 권위
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway가 스키마 소유, JPA는 매핑 검증만
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081   # ws-gateway=8080

wedocs:
  doc-service:
    # DocService 내부 gRPC 서버(M2 1b). engine=50051, gateway=8080, 위 REST(1c 예정)=8081과 별도 포트.
    grpc-port: 50052
    grpc-enabled: true   # 테스트 기본값은 false(src/test/resources/application.yml) — 포트 충돌 방지
    # 4MB — crdt-engine tonic 인바운드 한도(기존)와 정합. 런타임 기본값 암묵 의존 금지(secure-coding P2/P5).
    grpc-max-inbound-message-size: 4194304
    jwt:
      # RS256 개인키(PKCS#8 PEM) 위치 — prod/K8s는 Secret 파일 마운트(file:/...) 주입 필수(M5, ADR-0017).
      # 빈 값 = 시작 때 임시 키 생성 + WARN(dev 전용 — 재시작 시 기존 토큰 무효).
      private-key-location: ${WEDOCS_JWT_PRIVATE_KEY_LOCATION:}
      ttl: 24h   # ADR-0014: 예상 편집 세션보다 긴 TTL. 만료 = 재로그인(refresh token 비범위)
      issuer: wedocs-doc-service
    # CORS 화이트리스트(콤마 구분) — 기본 = vite dev(5173). prod 도메인은 M5에서 env 주입.
    cors-allowed-origins: ${WEDOCS_CORS_ALLOWED_ORIGINS:http://localhost:5173}
