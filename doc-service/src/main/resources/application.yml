spring:
  application:
    name: doc-service
  threads:
    virtual:
      enabled: true   # Java 25 Virtual Thread — I/O 바운드(DB) doc-service
  datasource:
    # 시크릿은 환경변수 주입(security.md). 로컬 기본값은 dev 편의용.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wedocs}
    username: ${SPRING_DATASOURCE_USERNAME:wedocs}
    password: ${SPRING_DATASOURCE_PASSWORD:wedocs}
  flyway:
    enabled: true   # 스키마 권위
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway가 스키마 소유, JPA는 매핑 검증만
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081   # ws-gateway=8080

wedocs:
  doc-service:
    # DocService 내부 gRPC 서버(M2 1b). engine=50051, gateway=8080, 위 REST(1c 예정)=8081과 별도 포트.
    grpc-port: 50052
    grpc-enabled: true   # 테스트 기본값은 false(src/test/resources/application.yml) — 포트 충돌 방지
    # 4MB — crdt-engine tonic 인바운드 한도(기존)와 정합. 런타임 기본값 암묵 의존 금지(secure-coding P2/P5).
    grpc-max-inbound-message-size: 4194304
