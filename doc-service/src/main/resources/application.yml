spring:
  application:
    name: doc-service
  threads:
    virtual:
      enabled: true   # Java 25 Virtual Thread — I/O 바운드(DB) doc-service
  datasource:
    # 시크릿은 환경변수 주입(security.md). 로컬 기본값은 dev 편의용.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wedocs}
    username: ${SPRING_DATASOURCE_USERNAME:wedocs}
    password: ${SPRING_DATASOURCE_PASSWORD:wedocs}
  flyway:
    enabled: true   # 스키마 권위
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway가 스키마 소유, JPA는 매핑 검증만
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081   # ws-gateway=8080
