spring:
  application:
    name: ws-gateway
  threads:
    virtual:
      enabled: true   # Java 25 Virtual Thread — I/O 바운드 게이트웨이 (가드레일: 풀링 금지)

server:
  port: 8080

wedocs:
  engine:
    target: localhost:50051   # crdt-engine gRPC (bidi Sync)
  gateway:
    # WS Origin 화이트리스트(secure-coding.md P5) — 콤마 구분. 기본 = vite dev(5173).
    # prod Origin은 WEDOCS_GATEWAY_ALLOWED_ORIGINS로 주입(환경 분리, "*" 금지).
    allowed-origins: ${WEDOCS_GATEWAY_ALLOWED_ORIGINS:http://localhost:5173}
